services:
    jahia:
        image: '${JAHIA_IMAGE}'
        container_name: jahia
        ports:
            - '8080:8080'
            - '8000:8000'
        environment:
            - SUPER_USER_PASSWORD=${SUPER_USER_PASSWORD}
            - JAHIA_LICENSE=${JAHIA_LICENSE}
            - JPDA=true
        networks:
            - stack
networks:
    stack:
